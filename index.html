<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Portal de Casos</title>

    <style>

        body{
            font-family: Arial;
            background:#f5f5f5;
            text-align:center;
            padding-top:100px;
        }

        .contenedor{
            background:white;
            width:400px;
            margin:auto;
            padding:30px;
            border-radius:10px;
            box-shadow:0px 0px 10px rgba(0,0,0,0.1);
        }

        input{
            width:90%;
            padding:12px;
            margin-top:20px;
            font-size:18px;
        }

        button{
            margin-top:20px;
            padding:12px 20px;
            background:#0078D4;
            color:white;
            border:none;
            border-radius:5px;
            font-size:16px;
            cursor:pointer;
        }

        #resultado{
            margin-top:20px;
            font-size:18px;
            font-weight:bold;
        }

        #subir{
            display:none;
        }

    </style>

</head>

<body>

    <div class="contenedor">

        <h1>PORTAL NUEVO 🔥</h1>

        <input 
            type="text" 
            id="caso" 
            placeholder="Ingrese número de caso"
        >

        <br>

        <button onclick="validarCaso()">
            Validar Caso
        </button>

        <div id="resultado"></div>

        <button 
            id="subir"
            onclick="subirArchivo()"
        >
            Subir Documentos
        </button>

    </div>

    <script>

        let casos = [];

        fetch("./casos.csv?v=" + new Date().getTime())

        .then(response => response.text())

        .then(data => {

            let lineas = data.split(/\r?\n/);

            for(let i = 1; i < lineas.length; i++){

                let caso = lineas[i].trim();

                if(caso.length > 0){

                    casos.push(caso);

                }

            }

        });

        function validarCaso(){

            let casoIngresado = document
                .getElementById("caso")
                .value
                .trim();

            let resultado = document
                .getElementById("resultado");

            let botonSubir = document
                .getElementById("subir");

            if(casos.includes(casoIngresado)){

                resultado.innerHTML = "✅ Caso encontrado";

                resultado.style.color = "green";

                botonSubir.style.display = "inline-block";

            }else{

                resultado.innerHTML = "❌ Caso no encontrado";

                resultado.style.color = "red";

                botonSubir.style.display = "none";

            }

        }

        function subirArchivo(){

            window.open(
                "https://integratelcorp-my.sharepoint.com/:f:/r/personal/eduardo_pinco_integratel_com_pe/Documents/PRUEBA_1001?csf=1&web=1&e=cOuNi6",
                "_blank"
            );

        }

    </script>

</body>

</html>
